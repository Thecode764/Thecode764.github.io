<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock</title>
    <link rel="icon" href="https://avatars.githubusercontent.com/u/141347375?s=400&u=59717d4c596f428a1080bd5acbe42ff6920d506f&v=4">
    <link rel="stylesheet" href="./clock.css">
    <script>
    function showYesNoCancelAlert(message) {
    var result = confirm(message);
    if (result) {
      alert("Go To Clock");
      document.getElementById("demo").style.color = "green";
      document.getElementById("demo").innerHTML = "green";
    } else if (result === false) {
      alert("Changed To Thecode746 Home Page");
      window.location.href = "https://thecode764.github.io";
    } else {
      alert("Changed To Home Page");
    }
  }
  showYesNoCancelAlert("Go To New Page?")
    </script>
    <script src="./clock.js"></script>
</head>
<body>
  <div id="clock">
  <ul id="tick-marks"></ul>
  <div class="second ticker"></div>
  <div class="minute ticker"></div>
  <div class="hour ticker"></div>
  <div id="time-output"></div>
</div>
</body>
</html>
